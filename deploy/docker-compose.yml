# ------------------------------------------------------------------
# KrwnOS — production-oriented compose stack.
#
#   docker compose -f deploy/docker-compose.yml up -d
#
# Runs three services:
#   • postgres     — метаданные, Vertical, Memberships, Invitations…
#   • redis        — шина событий + realtime
#   • app          — Next.js (KrwnOS kernel + UI)
#   • cloudflared  — (optional, profile: "tunnel") публичный URL
#
# .env лежит рядом с этим файлом: deploy/.env
# ------------------------------------------------------------------
name: krwnos

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-krwn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-krwn}
      POSTGRES_DB: ${POSTGRES_DB:-krwnos}
    volumes:
      - krwn_pg:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-krwn} -d ${POSTGRES_DB:-krwnos}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Не публикуем наружу по умолчанию — БД доступна только внутри compose-сети.
    # Раскомментируйте для Prisma Studio с хоста:
    # ports:
    #   - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - krwn_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: krwnos/app:${KRWN_VERSION:-0.1.0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-krwn}:${POSTGRES_PASSWORD:-krwn}@postgres:5432/${POSTGRES_DB:-krwnos}?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set. Run: openssl rand -hex 32}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      KRWN_TIER: ${KRWN_TIER:-pro}
      KRWN_VERSION: ${KRWN_VERSION:-0.1.0}
      NODE_ENV: production
    ports:
      - "${KRWN_PORT:-3000}:3000"
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - app

volumes:
  krwn_pg:
  krwn_redis:
